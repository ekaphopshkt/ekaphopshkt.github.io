<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการวาฟเฟิลมืออาชีพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow-lg">
        <!-- สรุปรายวัน -->
        <div class="bg-blue-600 text-white p-4 rounded-xl mb-4 text-center">
            <h2 class="text-lg">ยอดขายวันนี้</h2>
            <div class="text-3xl font-bold" id="dailyTotal">0 บาท</div>
            <div class="text-sm mt-2">ลูกค้า: <span id="dailyCust">0</span> คน | ขายได้: <span id="dailyItems">0</span> ชิ้น</div>
            <button onclick="clearDay()" class="mt-3 bg-red-500 w-full py-1 rounded text-xs">เริ่มวันใหม่ (ล้างข้อมูลวันนี้)</button>
        </div>

        <!-- ส่วนเมนู -->
        <div id="presetButtons" class="grid grid-cols-2 gap-2 mb-4"></div>
        <div class="flex gap-2 mb-4"><input type="text" id="cName" placeholder="ชื่อลูกค้า" class="flex-1 p-2 border rounded"><button onclick="newOrder()" class="bg-green-600 text-white px-4 rounded font-bold">+</button></div>
        
        <div id="activeOrders" class="space-y-4 mb-6"></div>

        <!-- ประวัติ -->
        <div class="border-t pt-4">
            <h3 class="font-bold mb-2">ประวัติย้อนหลัง</h3>
            <div id="historyList" class="text-sm text-gray-600 space-y-1"></div>
        </div>
    </div>

    <script>
        let stats = JSON.parse(localStorage.getItem('stats') || '{"total":0, "cust":0, "items":0, "history":[]}');
        
        function updateUI() {
            document.getElementById('dailyTotal').innerText = stats.total + " บาท";
            document.getElementById('dailyCust').innerText = stats.cust;
            document.getElementById('dailyItems').innerText = stats.items;
            let hist = document.getElementById('historyList');
            hist.innerHTML = stats.history.slice(-5).map(h => `<div>${h}</div>`).join('');
            localStorage.setItem('stats', JSON.stringify(stats));
        }

        function newOrder() {
            let name = document.getElementById('cName').value || "ลูกค้าทั่วไป";
            stats.cust++;
            let div = document.createElement('div');
            div.className = "border p-3 rounded-lg shadow-sm order-card bg-yellow-50";
            div.innerHTML = `<h3 class="font-bold text-blue-700">ลูกค้า: ${name}</h3><div class="items"></div><p class="font-bold text-right">ยอด: <span class="total">0</span></p>`;
            document.getElementById('activeOrders').prepend(div);
            document.getElementById('cName').value = '';
            updateUI();
        }

        function addToCurrent(name, price) {
            let active = document.querySelector('.order-card');
            if(!active) return alert("เปิดบิลก่อน");
            
            stats.total += price;
            stats.items++;
            stats.history.push(`${new Date().toLocaleTimeString()} - ${name} (${price}บ.)`);
            
            let item = document.createElement('div');
            item.className = "flex justify-between bg-white px-2 py-1 my-1 rounded cursor-pointer";
            item.innerHTML = `<span>${name}</span><span>${price}</span>`;
            active.querySelector('.items').appendChild(item);
            active.querySelector('.total').innerText = parseInt(active.querySelector('.total').innerText) + price;
            updateUI();
        }

        function clearDay() {
            if(confirm("เริ่มวันใหม่? ยอดทั้งหมดจะถูกรีเซ็ต")) {
                stats = {total:0, cust:0, items:0, history:[]};
                document.getElementById('activeOrders').innerHTML = '';
                updateUI();
            }
        }

        // โหลดเมนู (เหมือนเดิม)
        window.onload = updateUI;
    </script>
</body>
</html>
