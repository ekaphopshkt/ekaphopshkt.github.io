<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบออเดอร์วาฟเฟิลรายบุคคล</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-yellow-600 mb-4 text-center">จัดการออเดอร์วาฟเฟิล</h2>

        <!-- ตั้งค่าเมนู -->
        <div class="bg-yellow-50 p-3 rounded-lg mb-4 border border-yellow-200">
            <input type="text" id="menuName" placeholder="ชื่อเมนู" class="w-full p-1 mb-1 text-sm border rounded">
            <input type="number" id="menuPrice" placeholder="ราคา" class="w-full p-1 mb-1 text-sm border rounded">
            <button onclick="addPreset()" class="w-full bg-blue-500 text-white py-1 rounded text-sm font-bold">บันทึกเมนูใหม่</button>
        </div>

        <!-- สร้างออเดอร์ลูกค้า -->
        <div class="flex gap-2 mb-4">
            <input type="text" id="customerName" placeholder="ชื่อลูกค้า" class="flex-1 p-2 border rounded">
            <button onclick="newOrder()" class="bg-green-600 text-white px-4 rounded font-bold">เปิดบิล</button>
        </div>

        <div id="presetButtons" class="grid grid-cols-2 gap-2 mb-4"></div>
        <div id="activeOrders" class="space-y-4"></div>
    </div>

    <script>
        function addPreset() {
            let n = document.getElementById('menuName').value;
            let p = document.getElementById('menuPrice').value;
            if(!n || !p) return;
            let btn = document.createElement('button');
            btn.className = "bg-yellow-500 text-white p-2 rounded text-sm hover:bg-yellow-600";
            btn.innerText = `${n} (${p})`;
            btn.onclick = () => addToCurrent(n, p);
            document.getElementById('presetButtons').appendChild(btn);
        }

        function newOrder() {
            let name = document.getElementById('customerName').value || "ไม่ระบุชื่อ";
            let div = document.createElement('div');
            div.className = "border-t pt-3 order-card";
            div.innerHTML = `<h3 class="font-bold text-lg text-blue-800">ลูกค้า: ${name}</h3><div class="items"></div><p class="font-bold">รวม: <span class="total">0</span> บาท</p>`;
            document.getElementById('activeOrders').prepend(div);
            document.getElementById('customerName').value = '';
        }

        function addToCurrent(name, price) {
            let active = document.querySelector('.order-card');
            if(!active) return alert("โปรดกด 'เปิดบิล' ก่อนครับ");
            
            let item = document.createElement('div');
            item.className = "flex justify-between bg-gray-100 px-2 py-1 my-1 rounded text-sm cursor-pointer hover:bg-red-200";
            item.innerHTML = `<span>${name}</span><span>${price}</span>`;
            item.onclick = function() {
                let p = parseInt(price);
                let totalSpan = active.querySelector('.total');
                totalSpan.innerText = parseInt(totalSpan.innerText) - p;
                this.remove();
            };
            
            active.querySelector('.items').appendChild(item);
            let totalSpan = active.querySelector('.total');
            totalSpan.innerText = parseInt(totalSpan.innerText) + parseInt(price);
        }
    </script>
</body>
</html>
