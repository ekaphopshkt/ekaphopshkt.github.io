<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการวาฟเฟิลมืออาชีพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow-lg">
        <!-- สรุปรายวัน -->
        <div class="bg-blue-600 text-white p-4 rounded-xl mb-4 text-center">
            <h2 class="text-lg">ยอดขายวันนี้</h2>
            <div class="text-3xl font-bold" id="dailyTotal">0 บาท</div>
            <div class="text-sm mt-2">ลูกค้า: <span id="dailyCust">0</span> คน | ขายได้: <span id="dailyItems">0</span> ชิ้น</div>
            <button onclick="clearDay()" class="mt-3 bg-red-500 w-full py-1 rounded text-xs">เริ่มวันใหม่</button>
        </div>

        <!-- ตั้งค่าเมนู -->
        <div class="bg-gray-100 p-3 rounded-lg mb-4">
            <input type="text" id="mName" placeholder="ชื่อเมนู" class="w-full p-1 mb-1 border rounded text-sm">
            <input type="number" id="mPrice" placeholder="ราคา (15, 20, 25)" class="w-full p-1 mb-1 border rounded text-sm">
            <button onclick="saveMenu()" class="w-full bg-blue-500 text-white py-1 rounded text-sm font-bold">บันทึกเมนู</button>
        </div>

        <!-- รายการเมนูให้กด -->
        <div id="presetButtons" class="grid grid-cols-2 gap-2 mb-4"></div>

        <!-- เปิดบิล -->
        <div class="flex gap-2 mb-4"><input type="text" id="cName" placeholder="ชื่อลูกค้า" class="flex-1 p-2 border rounded"><button onclick="newOrder()" class="bg-green-600 text-white px-4 rounded font-bold">+</button></div>
        
        <div id="activeOrders" class="space-y-4 mb-6"></div>

        <!-- ประวัติ -->
        <div class="border-t pt-4">
            <h3 class="font-bold mb-2 text-sm">ประวัติล่าสุด</h3>
            <div id="historyList" class="text-xs text-gray-600 space-y-1"></div>
        </div>
    </div>

    <script>
        let stats = JSON.parse(localStorage.getItem('stats') || '{"total":0, "cust":0, "items":0, "history":[]}');
        
        window.onload = () => {
            let menus = JSON.parse(localStorage.getItem('myMenus') || '[]');
            menus.forEach(m => createMenuBtn(m.name, m.price));
            updateUI();
        };

        function getColor(p) {
            if (p == 15) return "bg-yellow-400";
            if (p == 20) return "bg-green-500";
            if (p == 25) return "bg-blue-500";
            return "bg-gray-500";
        }

        function createMenuBtn(name, price) {
            let container = document.getElementById('presetButtons');
            let div = document.createElement('div');
            div.className = `${getColor(price)} text-white rounded text-sm flex overflow-hidden`;
            div.innerHTML = `<button class="p-2 flex-1 text-left truncate" onclick="addToCurrent('${name}', ${price})">${name}(${price})</button>
                             <button class="bg-black/20 px-2" onclick="this.parentElement.remove(); deleteMenu('${name}')">x</button>`;
            container.appendChild(div);
        }

        function saveMenu() {
            let n = document.getElementById('mName').value;
            let p = parseInt(document.getElementById('mPrice').value);
            if(!n || !p) return;
            let menus = JSON.parse(localStorage.getItem('myMenus') || '[]');
            menus.push({name: n, price: p});
            localStorage.setItem('myMenus', JSON.stringify(menus));
            createMenuBtn(n, p);
        }

        function updateUI() {
            document.getElementById('dailyTotal').innerText = stats.total + " บาท";
            document.getElementById('dailyCust').innerText = stats.cust;
            document.getElementById('dailyItems').innerText = stats.items;
            let hist = document.getElementById('historyList');
            hist.innerHTML = stats.history.slice(-5).map(h => `<div>${h}</div>`).join('');
            localStorage.setItem('stats', JSON.stringify(stats));
        }

        function newOrder() {
            let name = document.getElementById('cName').value || "ลูกค้าทั่วไป";
            stats.cust++;
            let div = document.createElement('div');
            div.className = "border p-3 rounded-lg shadow-sm order-card bg-yellow-50";
            div.innerHTML = `<h3 class="font-bold text-blue-700 text-sm">ลูกค้า: ${name}</h3><div class="items"></div><p class="font-bold text-right text-sm">รวม: <span class="total">0</span></p>`;
            document.getElementById('activeOrders').prepend(div);
            document.getElementById('cName').value = '';
            updateUI();
        }

        function addToCurrent(name, price) {
            let active = document.querySelector('.order-card');
            if(!active) return alert("โปรดกดปุ่ม '+' เพื่อเปิดบิลลูกค้าก่อนครับ");
            
            stats.total += price;
            stats.items++;
            stats.history.push(`${name} (${price}บ.)`);
            
            let item = document.createElement('div');
            item.className = "flex justify-between bg-white px-2 py-1 my-1 rounded cursor-pointer text-xs";
            item.innerHTML = `<span>${name}</span><span>${price}</span>`;
            item.onclick = function() {
                this.remove();
            };
            active.querySelector('.items').appendChild(item);
            active.querySelector('.total').innerText = parseInt(active.querySelector('.total').innerText) + price;
            updateUI();
        }

        function deleteMenu(name) {
            let menus = JSON.parse(localStorage.getItem('myMenus') || '[]');
            menus = menus.filter(m => m.name !== name);
            localStorage.setItem('myMenus', JSON.stringify(menus));
        }

        function clearDay() {
            if(confirm("เริ่มวันใหม่? ยอดทั้งหมดจะถูกรีเซ็ต")) {
                stats = {total:0, cust:0, items:0, history:[]};
                document.getElementById('activeOrders').innerHTML = '';
                updateUI();
            }
        }
    </script>
</body>
</html>
