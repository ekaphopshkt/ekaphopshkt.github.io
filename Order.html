<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบรับออเดอร์วาฟเฟิล</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-50 p-4">
    <div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-yellow-600 mb-4 text-center">รับออเดอร์วาฟเฟิล</h2>
        
        <!-- ส่วนตั้งค่าเมนู (ทำครั้งเดียว) -->
        <div class="bg-gray-100 p-3 rounded-lg mb-4">
            <input type="text" id="newMenu" placeholder="ชื่อเมนู" class="w-full p-1 mb-1 text-sm border rounded">
            <input type="number" id="newPrice" placeholder="ราคา" class="w-full p-1 mb-1 text-sm border rounded">
            <button onclick="addPreset()" class="w-full bg-blue-500 text-white py-1 rounded text-sm">เพิ่มเมนูลงในรายการตัวเลือก</button>
        </div>

        <input type="text" id="customer" placeholder="ชื่อลูกค้า" class="w-full p-2 mb-3 border rounded">
        
        <!-- ส่วนเลือกเมนู -->
        <div id="menuButtons" class="grid grid-cols-2 gap-2 mb-4">
            <!-- ปุ่มเมนูจะมาแสดงที่นี่ -->
        </div>

        <div id="orderList" class="space-y-2 mb-4"></div>

        <div class="border-t pt-2 text-right">
            <span class="font-bold">รวม: </span><span id="total" class="font-bold text-lg">0</span> บาท
        </div>
        <button onclick="clearAll()" class="w-full bg-red-500 text-white p-2 mt-2 rounded-lg font-bold">ล้างออเดอร์ทั้งหมด</button>
    </div>

    <script>
        let total = 0;
        
        function addPreset() {
            let name = document.getElementById('newMenu').value;
            let price = document.getElementById('newPrice').value;
            if(name && price) {
                let btn = document.createElement('button');
                btn.className = "bg-yellow-500 text-white p-2 rounded text-sm";
                btn.innerText = name + " (" + price + ")";
                btn.onclick = () => addItem(name, parseInt(price));
                document.getElementById('menuButtons').appendChild(btn);
            }
        }

        function addItem(name, price) {
            total += price;
            let div = document.createElement('div');
            div.className = "flex justify-between bg-green-100 p-2 rounded cursor-pointer hover:bg-red-100 transition";
            div.innerHTML = `<span>${name}</span><span>${price}</span>`;
            div.onclick = function() {
                total -= price;
                document.getElementById('total').innerText = total;
                this.remove();
            };
            document.getElementById('orderList').appendChild(div);
            document.getElementById('total').innerText = total;
        }

        function clearAll() {
            document.getElementById('orderList').innerHTML = '';
            total = 0;
            document.getElementById('total').innerText = 0;
        }
    </script>
</body>
</html>
