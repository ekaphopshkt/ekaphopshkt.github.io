<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบออเดอร์วาฟเฟิล (V1.73)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-5 rounded-2xl shadow-lg">
        <div class="bg-blue-600 text-white p-4 rounded-xl mb-4 text-center">
            <h2 class="text-lg">ยอดขายวันนี้</h2>
            <div class="text-3xl font-bold" id="dailyTotal">0 บาท</div>
            <div class="text-sm mt-2">ลูกค้า: <span id="dailyCust">0</span> | ชิ้น: <span id="dailyItems">0</span></div>
            <button onclick="clearDay()" class="mt-3 bg-red-500 w-full py-1 rounded text-xs">เริ่มวันใหม่</button>
        </div>

        <div class="mb-4 bg-purple-50 p-3 rounded-lg border border-purple-200 text-center">
            <button id="mixBtn" onclick="toggleMixMode()" class="w-full bg-purple-600 text-white py-2 rounded font-bold text-sm">โหมดผสม 2 อย่าง (20 บาท)</button>
            <p id="mixStatus" class="text-xs text-purple-700 mt-1 font-bold hidden">สถานะ: กำลังเลือกไส้ที่ 1</p>
        </div>

        <div class="bg-gray-100 p-3 rounded-lg mb-4">
            <input type="text" id="mName" placeholder="ชื่อเมนู" class="w-full p-1 mb-1 border rounded text-sm">
            <input type="number" id="mPrice" placeholder="ราคา" class="w-full p-1 mb-1 border rounded text-sm">
            <button onclick="saveMenu()" class="w-full bg-blue-500 text-white py-1 rounded text-sm font-bold">บันทึกเมนู</button>
        </div>

        <div class="grid grid-cols-4 gap-1 mb-2">
            <button onclick="addTag('หญิง')" class="bg-pink-100 p-1 text-xs rounded">หญิง</button>
            <button onclick="addTag('ชาย')" class="bg-blue-100 p-1 text-xs rounded">ชาย</button>
            <button onclick="addTag('ใส่แว่น')" class="bg-gray-200 p-1 text-xs rounded">ใส่แว่น</button>
            <button onclick="addTag('ผมสั้น')" class="bg-gray-200 p-1 text-xs rounded">ผมสั้น</button>
            <button onclick="addTag('ผมยาว')" class="bg-gray-200 p-1 text-xs rounded">ผมยาว</button>
            <button onclick="addTag('ตัวเล็ก')" class="bg-gray-200 p-1 text-xs rounded">ตัวเล็ก</button>
            <button onclick="addTag('ตัวสูง')" class="bg-gray-200 p-1 text-xs rounded">ตัวสูง</button>
            <button onclick="addTag('อ้วน/ผอม')" class="bg-gray-200 p-1 text-xs rounded">อ้วน/ผอม</button>
        </div>

        <div class="flex gap-2 mb-4">
            <input type="text" id="cName" placeholder="ชื่อ / ลักษณะลูกค้า" class="flex-1 p-2 border rounded">
            <button onclick="newOrder()" class="bg-green-600 text-white px-4 rounded font-bold">+</button>
        </div>

        <div id="presetButtons" class="grid grid-cols-2 gap-2 mb-4"></div>
        <div id="activeOrders" class="space-y-4 mb-6"></div>
        <div class="text-center text-gray-400 text-[10px]">Version 1.73</div>
    </div>

    <script>
        let stats = JSON.parse(localStorage.getItem('stats') || '{"total":0, "cust":0, "items":0}');
        let isMixMode = false;
        let mixItems = [];

        function toggleMixMode() {
            isMixMode = !isMixMode;
            mixItems = [];
            let btn = document.getElementById('mixBtn');
            let status = document.getElementById('mixStatus');
            
            if(isMixMode) {
                btn.classList.add('bg-purple-800');
                status.classList.remove('hidden');
                status.innerText = "สถานะ: กำลังเลือกไส้ที่ 1";
            } else {
                btn.classList.remove('bg-purple-800');
                status.classList.add('hidden');
            }
        }

        function addToCurrent(name, price) {
            let active = document.querySelector('.order-card');
            if(!active) return alert("โปรดเปิดบิลก่อนครับ");
            
            if(isMixMode) {
                if(price !== 15) return alert("ผสมได้เฉพาะเมนูราคา 15 บาทเท่านั้น!");
                mixItems.push(name);
                
                if(mixItems.length === 1) {
                    document.getElementById('mixStatus').innerText = "สถานะ: เลือกไส้ที่ 1 แล้ว ("+name+") -> ต่อไปเลือกไส้ที่ 2";
                } else if(mixItems.length === 2) {
                    recordSale(mixItems.join('+'), 20);
                    mixItems = [];
                    toggleMixMode();
                }
            } else {
                recordSale(name, price);
            }
        }

        function addTag(tag) { document.getElementById('cName').value += (document.getElementById('cName').value ? " " : "") + tag; }
        
        function recordSale(name, price) {
            stats.total += price;
            stats.items++;
            updateUI();
            let item = document.createElement('div');
            item.className = "flex justify-between bg-white px-2 py-1 my-1 rounded border border-green-200 cursor-pointer text-xs";
            item.innerHTML = `<span>${name}</span><span>${price}</span>`;
            item.onclick = function() { this.remove(); };
            document.querySelector('.order-card .items').appendChild(item);
        }

        function newOrder() {
            let nameInput = document.getElementById('cName');
            let name = nameInput.value || "ลูกค้าทั่วไป";
            stats.cust++;
            updateUI();
            let div
