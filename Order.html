<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบรับออเดอร์วาฟเฟิล</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold text-yellow-600 mb-4 text-center">วาฟเฟิลกล้วยหอม</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium">ชื่อลูกค้า:</label>
            <input type="text" id="customerName" placeholder="ใส่ชื่อ..." class="w-full mt-1 p-2 border rounded-lg">
        </div>

        <div class="space-y-2 mb-4">
            <input type="text" id="menuName" placeholder="ชื่อเมนู" class="w-full p-2 border rounded-lg">
            <input type="number" id="menuPrice" placeholder="ราคา" class="w-full p-2 border rounded-lg">
            <button onclick="addItem()" class="w-full bg-yellow-500 text-white py-2 rounded-lg font-bold">เพิ่มรายการ</button>
        </div>

        <div id="orderList" class="space-y-2 mb-4 min-h-[50px]"></div>

        <div class="border-t pt-4">
            <p class="text-lg font-bold">รวม: <span id="totalPrice">0</span> บาท</p>
            <button onclick="printOrder()" class="w-full bg-green-600 text-white py-3 mt-4 rounded-xl font-bold">ยืนยันออเดอร์</button>
        </div>
    </div>

    <script>
        let items = [];
        let total = 0;

        function addItem() {
            const name = document.getElementById('menuName').value;
            const price = parseFloat(document.getElementById('menuPrice').value) || 0;
            if(name && price > 0) {
                items.push({ name, price });
                total += price;
                document.getElementById('orderList').innerHTML += `
                    <div class="flex justify-between bg-gray-50 p-2 rounded text-sm">
                        <span>${name}</span>
                        <span>${price} บาท</span>
                    </div>`;
                document.getElementById('totalPrice').innerText = total;
                document.getElementById('menuName').value = '';
                document.getElementById('menuPrice').value = '';
            }
        }

        function printOrder() {
            const customer = document.getElementById('customerName').value || "ไม่ระบุชื่อ";
            if(items.length === 0) return alert("กรุณาเพิ่มรายการก่อนครับ");
            alert(`ออเดอร์ของ ${customer}\nยอดรวม: ${total} บาท\nส่งไปที่ครัวเรียบร้อย!`);
            // ล้างค่าหลังทำเสร็จ
            items = [];
            total = 0;
            document.getElementById('orderList').innerHTML = '';
            document.getElementById('totalPrice').innerText = '0';
            document.getElementById('customerName').value = '';
        }
    </script>
</body>
</html>
