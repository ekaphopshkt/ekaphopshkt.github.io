<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Cost Manager - ระบบจัดการต้นทุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc; 
        }

        /* ตกแต่ง Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* การแสดงผลเมนูที่บันทึกไว้ */
        .recipe-card:hover .delete-btn { opacity: 1; }
        
        /* ปิดลูกศรในช่องตัวเลข */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-700">

    <div class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- ส่วนแสดงรายการที่บันทึกไว้ (Sidebar) -->
            <div class="lg:col-span-3 order-2 lg:order-1">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 h-[calc(100vh-60px)] sticky top-6 flex flex-col">
                    <div class="p-5 border-b border-slate-100">
                        <h2 class="font-bold text-slate-800 flex items-center gap-2">
                            <i class="fas fa-book-open text-indigo-500"></i> เมนูที่บันทึกไว้
                        </h2>
                    </div>
                    
                    <div id="recipeList" class="flex-grow overflow-y-auto p-4 space-y-3 custom-scroll">
                        <!-- รายการจะปรากฏที่นี่ -->
                    </div>

                    <div class="p-4 border-t bg-slate-50 rounded-b-3xl">
                        <button onclick="resetForm()" class="w-full py-3 bg-indigo-600 text-white rounded-2xl text-sm font-bold hover:bg-indigo-700 shadow-md transition-all">
                            <i class="fas fa-plus mr-1"></i> สร้างเมนูใหม่
                        </button>
                    </div>
                </div>
            </div>

            <!-- ส่วนคำนวณหลัก (Main) -->
            <div class="lg:col-span-9 order-1 lg:order-2 space-y-6">
                
                <!-- หัวข้อและปุ่มบันทึก -->
                <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 rounded-[2rem] p-6 text-white shadow-lg">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-grow w-full">
                            <label class="text-[10px] uppercase font-black opacity-70 mb-1 block">ชื่อเมนูอาหาร</label>
                            <input type="text" id="recipeName" placeholder="เช่น กะเพราเนื้อโคขุน" class="bg-white/10 border border-white/20 text-xl font-bold rounded-2xl p-3 w-full outline-none focus:bg-white/20 transition-all placeholder:text-white/30">
                        </div>
                        <button onclick="saveRecipe()" class="w-full md:w-auto bg-white text-indigo-600 px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-50 transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> บันทึกข้อมูล
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- ฝั่งซ้าย: วัตถุดิบ -->
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="font-bold text-slate-800 flex items-center gap-2">
                                    <i class="fas fa-list-ul text-orange-500"></i> รายการวัตถุดิบ
                                </h3>
                                <button onclick="addRow()" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full">
                                    + เพิ่มแถว
                                </button>
                            </div>
                            
                            <div id="ingredientContainer" class="space-y-3 mb-6"></div>

                            <div class="bg-orange-500 p-6 rounded-3xl text-white shadow-lg text-center">
                                <span class="text-xs font-bold opacity-90 mb-2 uppercase block">วัตถุดิบทั้งหมดทำได้กี่จาน?</span>
                                <div class="flex items-center justify-center gap-4">
                                    <input type="number" id="yield" value="1" min="1" oninput="calculate()" class="w-24 p-2 bg-white text-orange-600 rounded-2xl text-3xl font-black text-center outline-none">
                                    <span class="text-xl font-bold">จาน</span>
                                </div>
                            </div>
                        </div>

                        <!-- ต้นทุนแฝง -->
                        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                            <h3 class="font-bold text-slate-800 flex items-center gap-2 mb-6">
                                <i class="fas fa-bolt text-yellow-500"></i> ค่าไฟและค่าบรรจุภัณฑ์
                            </h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="bg-slate-50 p-3 rounded-2xl">
                                    <label class="block text-[10px] font-bold text-slate-400 text-center uppercase">วัตต์</label>
                                    <input type="number" id="watt" oninput="calculate()" class="w-full bg-transparent text-center font-bold text-lg outline-none" value="1000">
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl">
                                    <label class="block text-[10px] font-bold text-slate-400 text-center uppercase">ชม. ที่ใช้</label>
                                    <input type="number" id="hours" oninput="calculate()" class="w-full bg-transparent text-center font-bold text-lg outline-none" value="1">
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl">
                                    <label class="block text-[10px] font-bold text-slate-400 text-center uppercase">ค่าไฟ/หน่วย</label>
                                    <input type="number" id="unitRate" oninput="calculate()" class="w-full bg-transparent text-center font-bold text-lg outline-none" value="5">
                                </div>
                                <div class="bg-blue-50 p-3 rounded-2xl">
                                    <label class="block text-[10px] font-bold text-blue-400 text-center uppercase">ค่ากล่อง</label>
                                    <input type="number" id="pkg" oninput="calculate()" class="w-full bg-transparent text-center font-bold text-lg outline-none text-blue-600" value="0">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ฝั่งขวา: ผลลัพธ์ -->
                    <div class="space-y-6">
                        <div class="bg-slate-900 text-white rounded-[2.5rem] p-8 shadow-2xl">
                            <p class="text-xs text-slate-500 font-bold uppercase mb-1">ต้นทุนสุทธิต่อจาน</p>
                            <div class="text-5xl font-black text-white mb-8" id="costPerUnit">0.00 <span class="text-lg">฿</span></div>
                            
                            <div class="space-y-4 pt-6 border-t border-white/5">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-400">หัก GP แพลตฟอร์ม (%)</span>
                                    <input type="number" id="gp" value="32.1" oninput="calculate()" class="bg-white/5 w-16 text-right rounded-lg p-1 text-indigo-400 font-bold outline-none">
                                </div>
                                <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl">
                                    <p class="text-[10px] text-emerald-500 font-bold uppercase">ราคาขายแนะนำ (กำไร 30%)</p>
                                    <div class="text-2xl font-black text-emerald-400" id="recPrice">0 ฿</div>
                                </div>
                            </div>
                        </div>

                        <!-- จำลองราคาขาย -->
                        <div class="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm">
                            <h4 class="text-center text-[10px] font-black text-slate-400 uppercase mb-6">ลองตั้งราคาขายจริง</h4>
                            <input type="number" id="sellPrice" oninput="calculate()" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-4xl font-black text-indigo-700 text-center outline-none focus:border-indigo-500 mb-6" placeholder="0">
                            
                            <div class="space-y-3">
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400 uppercase text-[10px] font-bold">กำไรต่อจาน</span>
                                    <span id="profit" class="font-black text-xl">0.00 ฿</span>
                                </div>
                                <div id="margin" class="text-center text-[10px] font-bold text-emerald-500 py-1 bg-emerald-50 rounded-lg">Margin: 0%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- แจ้งเตือน -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-3xl text-sm font-bold shadow-2xl opacity-0 translate-y-10 transition-all pointer-events-none z-50">
        <span id="toastMsg">บันทึกเรียบร้อย</span>
    </div>

    <script>
        let recipes = JSON.parse(localStorage.getItem('food_recipe_data')) || [];

        function addRow(data = {name: '', price: ''}) {
            const container = document.getElementById('ingredientContainer');
            const div = document.createElement('div');
            div.className = 'grid grid-cols-12 gap-2 item-row';
            div.innerHTML = `
                <div class="col-span-8">
                    <input type="text" placeholder="ชื่อวัตถุดิบ" value="${data.name}" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none focus:border-indigo-400">
                </div>
                <div class="col-span-3">
                    <input type="number" oninput="calculate()" placeholder="ราคา" value="${data.price}" class="item-price w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none text-right font-bold">
                </div>
                <div class="col-span-1 flex items-center justify-center">
                    <button onclick="this.parentElement.parentElement.remove(); calculate();" class="text-slate-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                </div>
            `;
            container.appendChild(div);
        }

        function calculate() {
            const rows = document.querySelectorAll('.item-row');
            let totalBatch = 0;
            rows.forEach(row => {
                totalBatch += parseFloat(row.querySelector('.item-price').value) || 0;
            });

            const yieldAmt = Math.max(1, parseFloat(document.getElementById('yield').value) || 1);
            const avgIng = totalBatch / yieldAmt;

            const w = parseFloat(document.getElementById('watt').value) || 0;
            const h = parseFloat(document.getElementById('hours').value) || 0;
            const r = parseFloat(document.getElementById('unitRate').value) || 0;
            const avgElec = ((w / 1000) * h * r) / yieldAmt;

            const pkg = parseFloat(document.getElementById('pkg').value) || 0;
            const finalCost = avgIng + avgElec + pkg;

            document.getElementById('costPerUnit').innerText = finalCost.toLocaleString(undefined, {minimumFractionDigits: 2});

            const gpRate = parseFloat(document.getElementById('gp').value) || 0;
            const rec = finalCost / (1 - (gpRate / 100) - 0.30);
            document.getElementById('recPrice').innerText = (rec > 0 ? Math.ceil(rec) : 0).toLocaleString() + " ฿";

            const sell = parseFloat(document.getElementById('sellPrice').value) || 0;
            const netInc = sell - (sell * (gpRate / 100));
            const prof = netInc - finalCost;
            const marg = sell > 0 ? (prof / sell) * 100 : 0;

            const pEl = document.getElementById('profit');
            pEl.innerText = prof.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ฿";
            pEl.className = prof < 0 ? "font-black text-xl text-red-500" : "font-black text-xl text-slate-900";
            document.getElementById('margin').innerText = `Margin: ${marg.toFixed(1)}%`;
        }

        function saveRecipe() {
            const name = document.getElementById('recipeName').value.trim();
            if (!name) { showToast("ระบุชื่อเมนูก่อน"); return; }

            const rows = document.querySelectorAll('.item-row');
            const items = Array.from(rows).map(r => ({
                name: r.querySelector('input[type="text"]').value,
                price: r.querySelector('.item-price').value
            }));

            const data = {
                id: Date.now(),
                name: name,
                items: items,
                yield: document.getElementById('yield').value,
                watt: document.getElementById('watt').value,
                hours: document.getElementById('hours').value,
                unitRate: document.getElementById('unitRate').value,
                pkg: document.getElementById('pkg').value,
                gp: document.getElementById('gp').value,
                sellPrice: document.getElementById('sellPrice').value
            };

            const index = recipes.findIndex(r => r.name === name);
            if (index > -1) recipes[index] = data;
            else recipes.push(data);

            localStorage.setItem('food_recipe_data', JSON.stringify(recipes));
            renderRecipes();
            showToast("บันทึกสำเร็จ");
        }

        function renderRecipes() {
            const list = document.getElementById('recipeList');
            if (recipes.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-30 text-xs">ยังไม่มีข้อมูล</div>`;
                return;
            }
            list.innerHTML = recipes.map(r => `
                <div class="recipe-card group relative bg-slate-50 p-4 rounded-2xl cursor-pointer hover:bg-indigo-50 border border-transparent hover:border-indigo-100 transition-all" onclick="loadRecipe(${r.id})">
                    <p class="font-bold text-slate-700 text-sm truncate pr-6">${r.name}</p>
                    <p class="text-[9px] text-slate-400 mt-1 uppercase tracking-wider">${r.items.length} รายการ | ${r.yield} จาน</p>
                    <button onclick="event.stopPropagation(); deleteRecipe(${r.id})" class="delete-btn absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 transition-all">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                </div>
            `).join('');
        }

        function loadRecipe(id) {
            const r = recipes.find(x => x.id === id);
            if (!r) return;
            document.getElementById('recipeName').value = r.name;
            document.getElementById('yield').value = r.yield;
            document.getElementById('watt').value = r.watt;
            document.getElementById('hours').value = r.hours;
            document.getElementById('unitRate').value = r.unitRate;
            document.getElementById('pkg').value = r.pkg;
            document.getElementById('gp').value = r.gp;
            document.getElementById('sellPrice').value = r.sellPrice;
            const container = document.getElementById('ingredientContainer');
            container.innerHTML = '';
            r.items.forEach(i => addRow(i));
            calculate();
            showToast("โหลดสำเร็จ");
        }

        function deleteRecipe(id) {
            if(!confirm("ต้องการลบ?")) return;
            recipes = recipes.filter(r => r.id !== id);
            localStorage.setItem('food_recipe_data', JSON.stringify(recipes));
            renderRecipes();
        }

        function resetForm() {
            document.getElementById('recipeName').value = '';
            document.getElementById('ingredientContainer').innerHTML = '';
            addRow();
            calculate();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
            }, 3000);
        }

        window.onload = () => { renderRecipes(); addRow(); calculate(); };
    </script>
</body>
</html>
